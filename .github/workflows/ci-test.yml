---
name: Testing
on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
permissions:
  contents: read
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # V4.3.1
        with:
          persist-credentials: false
      - name: Install Poetry
        run: |
          pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # V5.6.0
        with:
          python-version-file: ".python-version"
          cache: poetry
      - name: Install dependencies
        run: |
          make install-dev
      - name: Run linters
        run: |
          make test
